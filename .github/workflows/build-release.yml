name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platforms;android-35"
          sdkmanager --install "build-tools;35.0.0"
          sdkmanager --install "platform-tools"

      - name: Create gradle wrapper
        run: |
          cat > gradlew << 'EOF'
          #!/bin/sh
          exec gradle "$@"
          EOF
          chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: List build outputs
        run: find app/build/outputs -name "*.apk" -type f

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*versionName = "\(.*\)"/\1/' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Tactile Notebook v${{ steps.version.outputs.version }}
          body: |
            ## Tactile Notebook — Organic Brutalism Edition

            ### Features
            - **Kinetic Dial**: Rotary disk toolbar at bottom-right corner
            - **Overlap Canvas**: Stacked cards with physics-based fling-to-archive
            - **Floating Anchor**: Dynamic shortcut bar following active note
            - **Spatial Search**: Drag canvas to navigate, no search bar needed
            - **Earthy Palette**: Parchment, clay, slate, rust — no pure black/white

            Built with Jetpack Compose + Room Database
          files: app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
